services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - path: .env
        required: false
      - path: .env.example
        required: false
    ports:
      - "3000:3000"
    volumes:
      - sqlite_data:/data
      - media_data:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        PUBLIC_API_BASE_URL: http://localhost:3000
    env_file:
      - path: .env
        required: false
      - path: .env.example
        required: false
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sqlite_data:
  media_data:

